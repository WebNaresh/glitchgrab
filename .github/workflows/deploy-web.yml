name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"

  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          response=$(curl -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel response: $response"
          if echo "$response" | grep -q '"error"'; then
            echo "::error::Vercel deploy hook returned an error"
            exit 1
          fi
