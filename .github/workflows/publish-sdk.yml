name: Publish SDK to npm

on:
  push:
    tags:
      - "sdk-v*" # Trigger on tags like sdk-v0.1.0, sdk-v1.0.0

  workflow_dispatch: # Manual trigger
    inputs:
      version:
        description: "Version to publish (e.g., 0.1.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/sdk-nextjs

      - name: Build SDK
        run: bun run build
        working-directory: packages/sdk-nextjs

      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.js
          test -f dist/index.mjs
          test -f dist/index.d.ts
        working-directory: packages/sdk-nextjs

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag or input
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/sdk-v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cd packages/sdk-nextjs && npm version $VERSION --no-git-tag-version

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/sdk-nextjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
